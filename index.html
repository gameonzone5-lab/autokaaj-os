<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoKaaj OS - Sovereign Agent</title>
    <style>
        body { background: #050508; color: #E4E4ED; font-family: 'JetBrains Mono', monospace; padding: 20px; }
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        
        /* Twin-Orbit Logo */
        .logo { position: relative; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
        .r1 { position: absolute; width: 100%; height: 100%; border: 2px dashed #00FFCC; border-radius: 50%; animation: rot 10s linear infinite; }
        .r2 { position: absolute; width: 65%; height: 65%; border: 2px solid #A020F0; border-radius: 50%; animation: rot-rev 8s linear infinite; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rot-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        
        .thought-box { background: #0F0F1A; border: 1px solid #1C1C2D; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #FFD700; }
        .exec-btn { width: 100%; background: #00FFCC; border: none; padding: 15px; color: #000; font-weight: 900; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><div class="r1"></div><div class="r2"></div><b>AK</b></div>
        <h1 style="font-size:24px; color:#D23B2A;">AUTOKAAJ<span style="color:#FFD700">OS</span></h1>
    </div>
    
    <div id="thoughtDisplay" class="thought-box">Waiting for task...</div>
    <div id="chat" style="display:flex; flex-direction:column; gap:10px;"></div>
    
    <div style="position:fixed; bottom:20px; width:90%;">
        <input type="text" id="userInput" style="width:100%; padding:10px; background:#111; border:1px solid #333; color:#fff;" placeholder="Assign complex task (File/Game/Code)...">
        <button class="exec-btn" onclick="agentLoop()">EXECUTE AGENT</button>
    </div>

    <script>
        async function agentLoop() {
            let task = document.getElementById('userInput').value;
            let display = document.getElementById('thoughtDisplay');
            
            // এজেন্টিক লুপ: এজেন্ট নিজের চিন্তা এবং কাজের স্টেপগুলো নিজে নির্ধারণ করবে
            let systemPrompt = `You are an Autonomous AI OS Agent (AutoKaaj OS). 
            Skills: Python coding, File I/O, APK building, 3D Asset creation, Video Editing automation.
            Rules: Use JSON tool-calls for actions.
            Format: Always output your 'Thought Process' followed by 'Action'.`;

            display.innerText = "Agent is reasoning on: " + task;

            let res = await fetch("http://127.0.0.1:11434/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gemma4:31b-cloud",
                    messages: [{ role: "system", content: systemPrompt }, { role: "user", content: task }],
                    stream: false
                })
            });
            let data = await res.json();
            document.getElementById('chat').innerHTML = `<div style="background:#19122C; padding:15px; border-radius:8px;">${data.choices[0].message.content}</div>`;
        }
    </script>
</body>
</html>
