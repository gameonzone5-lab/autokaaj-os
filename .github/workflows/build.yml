name: AutoKaaj OS Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Auto-Detect and Build APK
      run: |
        echo "Searching for gradlew..."
        # gradlew ফাইলটি যেখানেই থাকুক, তাকে খুঁজে রান পারমিশন দেবে এবং বিল্ড করবে
        find . -name "gradlew" -execdir chmod +x {} \;
        find . -name "gradlew" -execdir ./{} assembleDebug --stacktrace \;

    - name: Upload Final APK
      uses: actions/upload-artifact@v4
      with:
        name: AutoKaaj-OS-V5-App
        path: '**/*.apk' # বিল্ড হওয়া যেকোনো APK ফাইল অটোমেটিক আপলোড করবে
