name: AutoKaaj OS Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Android APK
      run: |
        # gradlew যে ফোল্ডারে আছে সেখানে প্রবেশ করে বিল্ড করবে
        GRADLE_DIR=$(dirname $(find . -name "gradlew" | head -n 1))
        echo "Building in directory: $GRADLE_DIR"
        cd $GRADLE_DIR
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload Final APK
      uses: actions/upload-artifact@v4
      with:
        name: AutoKaaj-OS-App-V5
        path: '**/*.apk'
