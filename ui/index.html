<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoKaaj OS</title>
    <style>
        :root { --bg: #07070A; --neon-blue: #00FFCC; --neon-purple: #9D00FF; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; }
        .header { display: flex; align-items: center; padding: 20px; }
        .logo-animated { width: 60px; height: 60px; border: 3px solid var(--neon-blue); border-radius: 50%; animation: spin 4s linear infinite; margin-right: 15px; box-shadow: 0 0 20px var(--neon-blue); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .status-bar { padding: 10px; border: 1px solid var(--neon-blue); color: var(--neon-blue); margin: 10px; border-radius: 5px; text-align: center; }
        .config-panel { padding: 10px; display: grid; gap: 10px; }
        input, select { background: #12121A; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; }
        .chat-container { padding: 15px; height: 50vh; overflow-y: auto; }
        .msg { background: #12121A; padding: 10px; margin-bottom: 10px; border-left: 3px solid var(--neon-purple); position: relative; }
        .copy-btn { position: absolute; top: 5px; right: 5px; cursor: pointer; color: var(--neon-blue); font-size: 10px; }
        .input-area { padding: 15px; display: flex; gap: 10px; position: fixed; bottom: 0; width: 100%; background: var(--bg); }
        button { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-animated"></div> 
        <h1>AutoKaaj OS</h1>
    </div>
    <div class="status-bar" id="status">✅ Free Cloud Model Active - gemma4:31b</div>
    <div class="config-panel">
        <select id="preset"><option>Ollama (Auto/Default)</option></select>
        <input type="text" id="model" value="gemma4:31b-cloud">
        <input type="text" id="apiUrl" placeholder="API Endpoint URL">
    </div>
    <div class="chat-container" id="chat">
        <div class="msg">System: Autonomous Agent Online. Ask me anything.<div class="copy-btn" onclick="copy(this)">COPY</div></div>
    </div>
    <div class="input-area">
        <input type="text" id="prompt" placeholder="Ask Agent to build or execute...">
        <button onclick="send()">EXECUTE</button>
    </div>
    <script>
        function copy(el) { navigator.clipboard.writeText(el.parentElement.innerText.replace('COPY', '')); alert("Copied!"); }
        async function send() {
            const p = document.getElementById('prompt').value;
            if(!p) return;
            document.getElementById('chat').innerHTML += `<div class="msg">USER: ${p}<div class="copy-btn" onclick="copy(this)">COPY</div></div>`;
            document.getElementById('prompt').value = '';
        }
    </script>
</body>
</html>
