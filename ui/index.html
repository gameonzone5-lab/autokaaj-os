<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoKaaj OS</title>
    <style>
        :root { --bg: #07070A; --surface: #12121A; --primary: #00FFCC; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; }
        .logo { width: 50px; height: 50px; border-radius: 12px; }
        .config { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .terminal { flex: 1; padding: 20px; overflow-y: auto; color: var(--primary); font-family: monospace; }
        .input-area { padding: 15px; background: var(--surface); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; }
        button { padding: 10px 20px; background: var(--primary); border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="icon.png" class="logo"> <!-- আপনার কালারফুল লোগো -->
            <div style="font-size: 1.5rem; font-weight: bold;">AutoKaaj</div>
        </div>
    </div>
    <div class="config">
        <select id="mode" onchange="toggleMode()">
            <option value="cloud">Cloud (Fast/Powerful)</option>
            <option value="local">Local (Small Models Only)</option>
        </select>
        <input type="text" id="modelInput" placeholder="Model Name (e.g. gemma:2b)">
    </div>
    <div class="terminal" id="terminal">Welcome to AutoKaaj. Select mode to start.</div>
    <div class="input-area">
        <input type="text" id="prompt" placeholder="Ask anything...">
        <button onclick="sendCommand()">EXECUTE</button>
    </div>
    <script>
        function toggleMode() {
            const mode = document.getElementById('mode').value;
            document.getElementById('modelInput').placeholder = mode === 'cloud' ? 'API Key / Cloud Model' : 'Model (phi3, gemma:2b)';
        }
        async function sendCommand() {
            const p = document.getElementById('prompt').value;
            document.getElementById('terminal').innerHTML += `<br>You: ${p}`;
            // এখানে আমাদের API কলগুলো হবে যা সরাসরি মডেল হ্যান্ডেল করবে
        }
    </script>
</body>
</html>
