<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoKaaj AI</title>
    <style>
        body { background: #07070A; color: #fff; font-family: monospace; padding: 20px; }
        .input-box { width: 100%; padding: 15px; border-radius: 10px; background: #12121A; border: 1px solid #333; color: white; margin-top: 10px; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; background: #00FFCC; color: black; font-weight: bold; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <h3>AutoKaaj OS - Cloud Native</h3>
    <div id="chat"></div>
    <input type="text" id="prompt" class="input-box" placeholder="Ask anything...">
    <button class="btn" onclick="askCloud()">EXECUTE VIA CLOUD</button>

    <script>
        async function askCloud() {
            const prompt = document.getElementById('prompt').value;
            // এটি সরাসরি ওপেন-সোর্স এপিআই গেটওয়েতে হিট করবে, কোনো টার্মাক্স লাগবে না
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Authorization': 'Bearer gsk_YOUR_API_KEY_HERE', 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    model: "llama3-70b-8192",
                    messages: [{role: "user", content: prompt}]
                })
            });
            const data = await response.json();
            document.getElementById('chat').innerHTML += `<p>Agent: ${data.choices[0].message.content}</p>`;
        }
    </script>
</body>
</html>
