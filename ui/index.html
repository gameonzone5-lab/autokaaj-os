<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoKaaj OS</title>
    <style>
        body { background: #07070A; color: #fff; font-family: monospace; padding: 10px; }
        .logo { width: 80px; height: 80px; background: #00FFCC; border-radius: 50%; margin: 0 auto; animation: spin 5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .chat-area { height: 70vh; overflow-y: auto; border: 1px solid #333; margin: 10px 0; padding: 10px; }
        .controls { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; background: #12121A; border: 1px solid #333; color: white; }
        button { padding: 10px; background: #00FFCC; color: black; border: none; }
        .copy-btn { font-size: 10px; color: #9D00FF; cursor: pointer; }
    </style>
</head>
<body>
    <div class="logo"></div>
    <div id="status" style="text-align:center; color:#00FFCC;">Connecting...</div>
    <select id="modelSelect" style="width:100%; margin:10px 0;">
        <option value="gemma4:31b-cloud">gemma4:31b-cloud (Default)</option>
    </select>
    <div class="chat-area" id="chat"></div>
    <div class="controls">
        <input type="text" id="prompt" placeholder="Command...">
        <button onclick="send()">EXECUTE</button>
    </div>
    <script>
        async function send() {
            const p = document.getElementById('prompt').value;
            document.getElementById('chat').innerHTML += `<div style="margin:10px; padding:10px; background:#1a1a1a;">${p} <div class="copy-btn" onclick="copy(this)">Copy</div></div>`;
        }
        function copy(el) { navigator.clipboard.writeText(el.parentElement.innerText); }
        window.onload = async function() {
            document.getElementById('status').innerText = "✅ Cloud Model Active";
        }
    </script>
</body>
</html>
