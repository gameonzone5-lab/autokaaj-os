<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoKaaj OS</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Futuristic Cyberpunk / Automation Color Palette */
            --bg-base: #0B0C10; /* Deepest black/grey */
            --bg-surface: #1F2833; /* Dark slate */
            --bg-panel: #1A1F2B;
            --accent-primary: #45A29E; /* Electric teal */
            --accent-secondary: #66FCF1; /* Neon cyan */
            --text-primary: #C5C6C7; /* Soft white */
            --text-secondary: #8B949E; /* Muted grey */
            --border-subtle: #2C3542;
            --danger: #FF4136;
            --success: #2ECC40;
            
            /* Typography */
            --font-ui: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-ui);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Prevent body scrolling */
        }

        /* --- Header Styling --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: linear-gradient(180deg, rgba(31,40,51,0.9) 0%, rgba(11,12,16,0.95) 100%);
            border-bottom: 1px solid var(--accent-primary);
            box-shadow: 0 2px 15px rgba(102, 252, 241, 0.1);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Redesigned Automation Logo */
        .logo-wrapper {
            position: relative;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(102, 252, 241, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(102, 252, 241, 0.3);
            box-shadow: inset 0 0 10px rgba(102, 252, 241, 0.2);
        }

        .logo-svg {
            width: 28px;
            height: 28px;
        }

        .logo-svg path {
            fill: none;
            stroke: var(--accent-secondary);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        .logo-svg circle {
             fill: var(--accent-secondary);
        }

        .title-group {
            display: flex;
            flex-direction: column;
        }

        .app-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
        }
        
        .app-title span {
            color: var(--accent-secondary);
        }

        .version-badge {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--bg-base);
            background: var(--accent-primary);
            padding: 2px 6px;
            border-radius: 4px;
            align-self: flex-start;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        /* --- Settings Panel --- */
        .settings-panel {
            background-color: var(--bg-panel);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-subtle);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            z-index: 5;
            transition: all 0.3s ease;
        }

        .input-group {
            position: relative;
        }

        select, input[type="text"], input[type="password"] {
            width: 100%;
            background-color: rgba(11, 12, 16, 0.7);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: var(--font-ui);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2345A29E%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 10px auto;
            padding-right: 30px;
        }

        select:focus, input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 0 2px rgba(102, 252, 241, 0.15);
        }

        .full-width {
            grid-column: span 2;
        }

        /* --- Terminal / Chat Area --- */
        .terminal-container {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(69, 162, 158, 0.03) 0%, transparent 70%),
                linear-gradient(rgba(44, 53, 66, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(44, 53, 66, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
        }

        .msg-bubble {
            max-width: 88%;
            padding: 12px 16px;
            border-radius: 12px;
            font-family: var(--font-code);
            font-size: 0.85rem;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-system {
            background: rgba(69, 162, 158, 0.1);
            border: 1px solid rgba(69, 162, 158, 0.3);
            border-left: 4px solid var(--accent-primary);
            color: var(--accent-secondary);
            align-self: flex-start;
        }

        .msg-user {
            background: rgba(197, 198, 199, 0.05);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg-ai {
            background: rgba(31, 40, 51, 0.8);
            border: 1px solid var(--border-subtle);
            border-left: 4px solid var(--accent-secondary);
            color: var(--text-primary);
            align-self: flex-start;
            border-top-left-radius: 2px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            padding-bottom: 32px; 
        }

        .msg-label {
            font-family: var(--font-ui);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            opacity: 0.7;
        }
        
        .msg-user .msg-label { color: var(--text-secondary); text-align: right; }
        .msg-ai .msg-label { color: var(--accent-secondary); }

        .btn-copy {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: var(--font-ui);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-copy:hover {
            background: rgba(102, 252, 241, 0.1);
            color: var(--accent-secondary);
            border-color: var(--accent-secondary);
        }
        
        .btn-copy.copied {
            background: rgba(46, 204, 64, 0.1);
            color: var(--success);
            border-color: var(--success);
        }

        .thinking-wrapper {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(31, 40, 51, 0.5);
            border-radius: 12px;
            align-self: flex-start;
            border: 1px solid var(--border-subtle);
        }

        .loader-pulse {
            width: 12px;
            height: 12px;
            background-color: var(--accent-secondary);
            border-radius: 50%;
            animation: pulse 1.2s infinite cubic-bezier(0.45, 0, 0.55, 1);
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(102, 252, 241, 0.7); }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 0 6px rgba(102, 252, 241, 0); }
            100% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(102, 252, 241, 0); }
        }

        .thinking-text {
            font-family: var(--font-code);
            font-size: 0.8rem;
            color: var(--accent-secondary);
        }

        /* --- Input Area --- */
        .input-wrapper {
            background: var(--bg-surface);
            padding: 12px 16px 16px 16px; 
            border-top: 1px solid var(--border-subtle);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .file-upload-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-input-hidden {
            display: none;
        }

        .file-upload-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--bg-panel);
            color: var(--text-primary);
            border: 1px dashed var(--accent-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: var(--font-ui);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .file-upload-btn:hover {
            background: rgba(69, 162, 158, 0.1);
            border-style: solid;
        }
        
        .file-upload-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--accent-secondary);
        }

        .file-name-display {
            font-family: var(--font-code);
            font-size: 0.7rem;
            color: var(--accent-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }

        .command-row {
            display: flex;
            gap: 8px;
        }

        .command-input {
            flex: 1;
            background: var(--bg-base);
            color: #fff;
            border: 1px solid var(--border-subtle);
            padding: 12px 16px;
            border-radius: 10px;
            font-family: var(--font-ui);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .command-input:focus {
            border-color: var(--accent-secondary);
            box-shadow: inset 0 0 0 1px var(--accent-secondary);
        }
        
        .command-input::placeholder {
            color: var(--text-secondary);
            font-family: var(--font-ui);
        }

        .btn-execute {
            background: var(--accent-primary);
            color: var(--bg-base);
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-family: var(--font-ui);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-execute:hover {
            background: var(--accent-secondary);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 252, 241, 0.3);
        }
        
        .btn-execute:active {
            transform: translateY(1px);
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="brand">
            <div class="logo-wrapper">
                <svg class="logo-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L20.66 7V17L12 22L3.34 17V7L12 2Z" />
                    <path d="M12 22V12" />
                    <path d="M12 12L20.66 7" />
                    <path d="M12 12L3.34 7" />
                    <circle cx="12" cy="12" r="2" />
                </svg>
            </div>
            <div class="title-group">
                <div class="app-title">Auto<span>Kaaj</span></div>
                <div class="version-badge">OS v3.0 (Agent)</div>
            </div>
        </div>
    </header>

    <div class="settings-panel">
        <div class="input-group">
            <select id="preset" onchange="updatePreset()">
                <option value="local">Ollama (Local)</option>
                <option value="gemini">Google Gemini (Native)</option>
                <option value="groq">Groq (Native)</option>
                <option value="deepseek">DeepSeek (Native)</option>
                <option value="openai">OpenAI (Native)</option>
                <option value="openrouter">OpenRouter (Universal)</option>
                <option value="together">Together AI</option>
            </select>
        </div>
        <div class="input-group">
            <input type="text" id="model" placeholder="Model name">
        </div>
        <div class="input-group full-width">
            <input type="text" id="baseUrl" placeholder="Base URL">
        </div>
        <div class="input-group full-width">
            <input type="password" id="apiKey" placeholder="Enter API Key (Optional for Local)">
        </div>
    </div>

    <div class="terminal-container" id="terminal">
        <div class="msg-bubble msg-system">
            <div class="msg-label">System Initialize</div>
            AutoKaaj OS Agent Online.<br>
            Neural routing active. Ready to process text, documents, vision, and execute terminal automation.
        </div>
        
        <div class="thinking-wrapper" id="thinkingIndicator">
            <div class="loader-pulse"></div>
            <div class="thinking-text">Agent is processing...</div>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="file-upload-container">
            <label for="fileInput" class="file-upload-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-3.04-2.46-5.5-5.5-5.5S4 1.96 4 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                </svg>
                Attach File
            </label>
            <input type="file" id="fileInput" class="file-input-hidden" accept=".pdf, .jpg, .png" onchange="updateFileName()">
            <span class="file-name-display" id="fileNameDisplay"></span>
        </div>
        
        <div class="command-row">
            <input type="text" class="command-input" id="prompt" placeholder="Message Agent or type a command..." onkeypress="if(event.key === 'Enter') sendCommand()">
            <button class="btn-execute" onclick="sendCommand()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const presets = {
            gemini: { url: "https://generativelanguage.googleapis.com", defaultModel: "gemini-1.5-pro" },
            groq: { url: "https://api.groq.com/openai/v1", defaultModel: "llama3-70b-8192" },
            deepseek: { url: "https://api.deepseek.com/v1", defaultModel: "deepseek-coder" },
            openai: { url: "https://api.openai.com/v1", defaultModel: "gpt-4-turbo" },
            openrouter: { url: "https://openrouter.ai/api/v1", defaultModel: "anthropic/claude-3-opus" },
            together: { url: "https://api.together.xyz/v1", defaultModel: "meta-llama/Llama-3-70b-chat-hf" },
            local: { url: "http://127.0.0.1:11434/v1", defaultModel: "llama3" }
        };

        function updatePreset() {
            const selected = document.getElementById('preset').value;
            const baseUrlInput = document.getElementById('baseUrl');
            baseUrlInput.value = presets[selected].url;
            document.getElementById('model').value = presets[selected].defaultModel;
            
            if(selected === "gemini") {
                baseUrlInput.style.opacity = "0.5";
                baseUrlInput.readOnly = true;
            } else {
                baseUrlInput.style.opacity = "1";
                baseUrlInput.readOnly = false;
            }
        }
        
        updatePreset();

        function updateFileName() {
            const fileInput = document.getElementById('fileInput');
            const display = document.getElementById('fileNameDisplay');
            if (fileInput.files.length > 0) {
                display.textContent = fileInput.files[0].name;
            } else {
                display.textContent = "";
            }
        }

        const chatHistory = [];

        window.copyText = function(btn, text) {
            navigator.clipboard.writeText(decodeURIComponent(text)).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied`;
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.remove('copied');
                }, 2000);
            });
        };

        function appendMessage(sender, text, type) {
            const term = document.getElementById('terminal');
            const thinking = document.getElementById('thinkingIndicator');
            
            const msgBubble = document.createElement('div');
            
            let labelText = '';
            if (type === 'user') {
                msgBubble.className = 'msg-bubble msg-user';
                labelText = 'You';
            } else if (type === 'ai') {
                msgBubble.className = 'msg-bubble msg-ai';
                labelText = 'Agent';
            } else {
                msgBubble.className = 'msg-bubble msg-system';
                labelText = 'System';
            }
            
            let formattedText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>');
            formattedText = formattedText.replace(/\[Agent Executed Actions:\]/g, '<strong style="color:var(--accent-secondary)">[Agent Executed Actions:]</strong>');
            
            msgBubble.innerHTML = `<div class="msg-label">${labelText}</div>${formattedText}`;

            if (type === 'ai') {
                const safeText = encodeURIComponent(text);
                const copyBtn = document.createElement('button');
                copyBtn.className = 'btn-copy';
                copyBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy`;
                copyBtn.setAttribute('onclick', `copyText(this, '${safeText}')`);
                msgBubble.appendChild(copyBtn);
            }

            term.insertBefore(msgBubble, thinking);
            term.scrollTop = term.scrollHeight;
        }

        async function sendCommand() {
            const promptInput = document.getElementById('prompt');
            const fileInput = document.getElementById('fileInput');
            const thinking = document.getElementById('thinkingIndicator');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            
            const userText = promptInput.value.trim();
            
            if(!userText && fileInput.files.length === 0) return;

            const providerKey = document.getElementById('preset').value;
            const model = document.getElementById('model').value;
            const baseUrl = document.getElementById('baseUrl').value;
            const apiKey = document.getElementById('apiKey').value;

            if(!apiKey && providerKey !== "local") { 
                alert("Please provide an API Key."); 
                return; 
            }

            let displayMsg = userText;
            if(fileInput.files.length > 0) {
                displayMsg += `<br><span style="color:var(--accent-primary); font-size: 0.8em;">📎 Attached: ${fileInput.files[0].name}</span>`;
            }
            
            appendMessage('USER', displayMsg, 'user');
            chatHistory.push({ role: "user", content: userText || "Analyze the attached file." });
            
            promptInput.value = '';

            const formData = new FormData();
            formData.append('provider', providerKey);
            formData.append('model', model);
            formData.append('base_url', baseUrl);
            formData.append('api_key', apiKey);
            formData.append('messages', JSON.stringify(chatHistory));
            
            if(fileInput.files.length > 0) {
                formData.append('file', fileInput.files[0]);
            }

            thinking.style.display = 'flex';
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
            promptInput.disabled = true;

            try {
                const response = await fetch('/api/v1/chat', { method: 'POST', body: formData });
                const data = await response.json();
                
                thinking.style.display = 'none'; 
                promptInput.disabled = false;
                
                let aiReply = "Error processing request.";
                if(response.ok && data.choices && data.choices.length > 0) {
                    aiReply = data.choices[0].message.content;
                    chatHistory.push({ role: "assistant", content: aiReply });
                } else if(data.detail) {
                    aiReply = data.detail; 
                }
                
                appendMessage('AGENT', aiReply, 'ai');
                
                fileInput.value = ''; 
                fileNameDisplay.textContent = '';
                promptInput.focus();
                
            } catch(e) {
                thinking.style.display = 'none';
                promptInput.disabled = false;
                appendMessage('SYSTEM', e.message, 'system');
            }
        }
    </script>
</body>
</html>
